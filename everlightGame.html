<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🧪 永光化學 — 觀音的化學力量</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=LXGW+WenKai+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
:root{--bg:rgba(232,240,248,0.93);--bgs:#e8f0f8;--brd:#a8c0d8;--teal:#1a6b8a;--gold:#c8922a;--red:#c2625a;--green:#2e8b57;--purple:#6a5acd;--txt:#1e2d3d;--muted:#5a7088;--light:#8aa0b8;}
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;user-select:none;}
body{font-family:'LXGW WenKai TC','Noto Serif TC',serif;width:100vw;height:100dvh;overflow:hidden;color:var(--txt);display:flex;flex-direction:column;background:#1a4a6a;}
#chem-bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(135deg,#0f3b5e 0%,#1a5276 30%,#1e6090 60%,#1a5276 100%);}
.particle{position:absolute;width:3px;height:3px;background:rgba(212,160,74,0.4);border-radius:50%;animation:twinkle 3s ease-in-out infinite;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.3);}50%{opacity:1;transform:scale(1.5);}}
#hud{flex:0 0 auto;background:var(--bg);border-bottom:2px solid var(--brd);padding:4px;padding-top:max(4px,env(safe-area-inset-top));display:grid;grid-template-columns:repeat(5,1fr);gap:2px;z-index:100;position:relative;backdrop-filter:blur(12px);}
.stat-box{text-align:center;border:1.5px solid var(--brd);background:rgba(255,255,255,0.5);padding:2px 1px;border-radius:6px;cursor:pointer;transition:background 0.2s;position:relative;}
.stat-box:active{background:rgba(220,235,250,0.8);}
.stat-box.warn{background:rgba(255,200,50,0.15);border-color:#d4a04a;}
.stat-box.danger{background:rgba(194,98,90,0.12);border-color:var(--red);}
.stat-label{font-size:9px;color:var(--muted);display:block;letter-spacing:0.5px;}
.stat-val{font-family:'Playfair Display',serif;font-size:15px;color:var(--txt);font-weight:bold;line-height:1;}
.stat-val.gold{color:#a06a08;}.stat-val.teal{color:#1a6b8a;}.stat-val.green{color:#2e8b57;}.stat-val.red{color:#b03830;}.stat-val.purple{color:#6a5acd;}
#info-bar{display:flex;width:100%;background:rgba(232,240,248,0.92);border-bottom:1.5px solid var(--brd);font-size:11px;line-height:1.3;z-index:90;flex-shrink:0;backdrop-filter:blur(8px);}
#info-bar-story{flex:1;padding:3px 6px;border-right:1px solid var(--brd);color:var(--txt);}
#info-bar-goals{flex:1;padding:3px 6px;}
#info-bar-story .bar-title{font-size:11px;color:var(--teal);font-weight:700;margin-bottom:1px;font-family:'Noto Serif TC',serif;}
#info-bar-goals .bar-title{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:1px;font-family:'Noto Serif TC',serif;}
.goal-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--txt);}
.goal-item .gc{font-size:11px;}.goal-item .gc.done{color:var(--green);font-weight:bold;}
#game-stage{flex:1;position:relative;display:flex;justify-content:center;align-items:center;overflow:hidden;width:100%;z-index:1;}
#factory-view{position:relative;width:100%;height:100%;transition:filter 0.5s;}
#factory-view.polluted{filter:sepia(0.2) brightness(0.9);}
#factory-view.very-polluted{filter:sepia(0.4) brightness(0.75) contrast(1.1);}
#year-display{position:absolute;top:8px;left:8px;padding:4px 12px;color:var(--txt);font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;z-index:92;pointer-events:none;background:rgba(232,240,248,0.85);border-radius:16px;border:1.5px solid var(--brd);backdrop-filter:blur(8px);letter-spacing:2px;}
#stage-badge{position:absolute;top:8px;right:8px;padding:3px 10px;color:#fff;font-family:'Noto Serif TC',serif;font-size:11px;font-weight:700;z-index:92;background:var(--teal);border-radius:12px;}
#factory-grid{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:50px 10px 22px;overflow:hidden;}
.fac-zone{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);border-radius:8px;padding:5px 8px;min-height:36px;flex-wrap:wrap;}
.fac-zone-label{font-size:9px;color:rgba(255,255,255,0.55);width:26px;flex-shrink:0;text-align:right;padding-right:5px;border-right:1px solid rgba(255,255,255,0.2);margin-right:3px;letter-spacing:0.5px;}
.fac-tile{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.12);border-radius:6px;padding:3px 7px;cursor:default;}
.fac-tile .fe{font-size:18px;line-height:1;}.fac-tile .fc{font-size:11px;color:rgba(255,255,255,0.95);font-weight:bold;font-family:'Playfair Display',serif;}
.fac-empty{font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;padding-left:4px;}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
#data-overlay{position:absolute;bottom:22px;left:6px;background:rgba(232,240,248,0.9);border:1.5px solid var(--brd);padding:4px 6px;width:140px;z-index:95;pointer-events:none;border-radius:8px;backdrop-filter:blur(8px);}
.drow{font-size:10px;color:var(--muted);margin-bottom:1px;display:flex;justify-content:space-between;align-items:center;white-space:nowrap;}
.dval{color:var(--txt);font-weight:bold;font-family:'Playfair Display',serif;font-size:12px;}
.dval.bad{color:var(--red);}
.dsep{border-top:1px dashed var(--brd);margin:2px 0;}
#poll-bar{position:absolute;bottom:0;left:0;right:0;height:16px;background:rgba(0,0,0,0.2);z-index:96;display:flex;align-items:center;padding:0 4px;}
#poll-fill{height:10px;border-radius:5px;transition:width 0.4s,background 0.4s;min-width:2px;}
#poll-label{position:absolute;right:6px;font-size:9px;color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
#bottom-panel{flex:0 0 auto;background:var(--bg);border-top:2px solid var(--brd);height:220px;padding:3px 5px;padding-bottom:calc(3px + env(safe-area-inset-bottom));display:flex;flex-direction:column;z-index:100;position:relative;backdrop-filter:blur(12px);}
.tabs{display:flex;gap:6px;margin-bottom:0;flex-shrink:0;align-items:flex-end;border-bottom:1.5px solid var(--teal);}
.tab-b{flex:1;background:rgba(255,255,255,0.3);border:1.5px solid var(--brd);border-bottom:1.5px solid var(--teal);color:var(--muted);padding:5px;font-weight:700;font-size:12px;cursor:pointer;text-align:center;transition:all 0.25s;border-top-left-radius:8px;border-top-right-radius:8px;z-index:1;font-family:'LXGW WenKai TC',serif;letter-spacing:1px;}
.tab-b.active{background:rgba(26,107,138,0.1);border-color:var(--teal);border-bottom:1.5px solid var(--bg);color:var(--teal);margin-bottom:-1.5px;z-index:10;padding-bottom:7px;}
.tab-c{display:none;flex:1;overflow:hidden;flex-direction:column;margin-top:0;padding-top:3px;}
.tab-c.active{display:flex;}
.deck{display:flex;gap:3px;flex:1;width:100%;padding-top:3px;min-height:0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
.bcard{flex:0 0 78px;min-width:68px;position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(232,240,248,0.8) 100%);border:1.5px solid var(--brd);padding:2px 2px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:0;border-radius:8px;transition:all 0.2s;overflow:visible;}
.bcard:active{transform:scale(0.97);}.bcard.disabled{opacity:0.35;filter:grayscale(0.7);}
.bcard.green-card{border-color:var(--green);background:linear-gradient(180deg,rgba(220,255,230,0.6) 0%,rgba(200,240,210,0.8) 100%);}
.bcard .badge{position:absolute;top:-4px;right:-4px;background:var(--teal);color:#fff;border:1.5px solid #fff;border-radius:8px;font-family:'Playfair Display',serif;font-size:12px;font-weight:bold;padding:0 5px;z-index:10;}
.bcard .emoji{font-size:18px;margin-top:1px;}.bcard .name{font-size:10px;text-align:center;white-space:nowrap;color:var(--txt);font-weight:700;font-family:'Noto Serif TC',serif;}
.bcard .divider{width:60%;height:1px;background:var(--brd);margin:1px 0;}
.bcard .info{font-size:9px;color:var(--muted);text-align:center;line-height:1.2;}
.bcard .cost{font-family:'Playfair Display',serif;color:var(--gold);font-size:12px;font-weight:bold;margin-top:auto;}
.bcard .poll-cost{font-size:9px;color:var(--red);font-weight:700;}
.lock-ov{position:absolute;inset:0;background:rgba(232,240,248,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:10px;font-weight:bold;z-index:5;text-align:center;border-radius:8px;}
.tcard{flex:0 0 88px;min-width:78px;position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(232,240,248,0.8) 100%);border:1.5px solid var(--brd);padding:4px;display:flex;flex-direction:column;align-items:center;gap:1px;border-radius:8px;cursor:pointer;transition:all 0.2s;}
.tcard:active{transform:scale(0.97);background:rgba(26,107,138,0.08);}
.tcard.done{opacity:0.4;border-color:var(--green);}
.tcard .flag{font-size:22px;}.tcard .cname{font-size:10px;font-weight:700;color:var(--txt);text-align:center;}
.tcard .creq{font-size:8px;color:var(--muted);text-align:center;line-height:1.2;}
.tcard .crwd{font-size:10px;color:var(--gold);font-weight:700;margin-top:auto;}
.sep-label{flex:0 0 auto;writing-mode:vertical-rl;font-size:10px;color:var(--teal);font-weight:700;padding:4px 2px;display:flex;align-items:center;border-right:1.5px dashed var(--brd);margin-right:3px;}
#next-btn{position:fixed;bottom:calc(230px + env(safe-area-inset-bottom));right:12px;width:56px;height:56px;background:var(--teal);border:2.5px solid #fff;border-radius:50%;box-shadow:0 3px 12px rgba(0,0,0,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:150;cursor:pointer;font-size:11px;font-weight:700;text-align:center;line-height:1.1;animation:pulse-btn 2s ease-in-out infinite;font-family:'LXGW WenKai TC',serif;color:#fff;letter-spacing:1px;}
#next-btn:active{transform:scale(0.95);}
@keyframes pulse-btn{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
#toast-c{position:fixed;top:calc(108px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);width:260px;pointer-events:none;z-index:1500;display:flex;flex-direction:column;gap:5px;}
.toast{background:rgba(232,240,248,0.95);color:var(--txt);border-left:3px solid var(--light);padding:5px 10px;font-family:'LXGW WenKai TC',serif;font-size:12px;border-radius:8px;backdrop-filter:blur(8px);opacity:0;transform:translateY(-8px);animation:tIn 0.3s forwards;transition:all 0.4s ease;}
.toast.good{border-color:var(--green);}.toast.bad{border-color:var(--red);color:var(--red);}.toast.warn{border-color:var(--gold);color:#8a6a10;}
@keyframes tIn{to{opacity:1;transform:translateY(0);}}
.toast.hiding{opacity:0;transform:translateX(10px);max-height:0;padding:0;margin:0;border:none;}
#modal-ov{position:fixed;inset:0;background:rgba(15,35,64,0.55);z-index:3000;display:none;justify-content:center;align-items:center;padding:15px;backdrop-filter:blur(4px);}
.mdlg{background:linear-gradient(135deg,var(--teal),#2a8aaa);border:2px solid rgba(255,255,255,0.5);padding:3px;width:95%;max-width:380px;max-height:88vh;box-shadow:0 12px 40px rgba(0,0,0,0.25);display:flex;flex-direction:column;border-radius:14px;}
.mdlg-in{background:var(--bgs);border:1px solid var(--brd);padding:14px;text-align:center;overflow-y:auto;border-radius:12px;}
.mbtn{margin-top:10px;background:rgba(26,107,138,0.1);color:var(--txt);border:1.5px solid var(--brd);padding:9px 18px;cursor:pointer;font-size:14px;width:100%;font-family:'Noto Serif TC',serif;font-weight:700;border-radius:10px;transition:all 0.2s;letter-spacing:2px;}
.mbtn:active{transform:scale(0.97);background:rgba(26,107,138,0.2);}
.mbtn.gold{background:rgba(200,146,42,0.12);color:var(--gold);border-color:var(--gold);}
.mbtn.red{background:rgba(194,98,90,0.1);color:var(--red);border-color:var(--red);}
.ch-btn{background:rgba(26,107,138,0.06);border:1.5px solid var(--brd);padding:8px 10px;cursor:pointer;font-size:12px;text-align:left;font-family:'LXGW WenKai TC',serif;border-radius:8px;transition:all 0.2s;color:var(--txt);line-height:1.4;margin-top:6px;}
.ch-btn:active{background:rgba(26,107,138,0.15);border-color:var(--teal);}
.ch-title{font-weight:700;color:var(--teal);margin-bottom:2px;}
.ch-desc{font-size:11px;color:var(--muted);}
#name-ov{display:none;position:fixed;inset:0;z-index:6000;background:linear-gradient(135deg,#0f3b5e 0%,#1a5276 35%,#1e6090 65%,#1a5276 100%);flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#tut-ov{position:fixed;inset:0;background:rgba(15,30,50,0.72);z-index:2000;display:none;cursor:pointer;backdrop-filter:blur(3px);}
#tut-tip{position:fixed;top:30%;left:50%;transform:translateX(-50%);background:rgba(232,240,248,0.97);color:var(--txt);padding:16px 18px;border-radius:14px;font-weight:600;z-index:2002;display:none;box-shadow:0 8px 30px rgba(0,0,0,0.2);text-align:center;width:80%;animation:fTip 2s ease-in-out infinite alternate;cursor:pointer;font-family:'LXGW WenKai TC',serif;line-height:1.6;}
.tut-t{color:var(--teal);font-size:14px;margin-bottom:6px;border-bottom:1.5px solid var(--brd);padding-bottom:3px;font-family:'Noto Serif TC',serif;font-weight:700;letter-spacing:2px;}
@keyframes fTip{from{transform:translate(-50%,0);}to{transform:translate(-50%,-8px);}}
.tut-next{font-size:10px;color:var(--light);margin-top:6px;}
.hl-target{z-index:2001!important;position:relative!important;box-shadow:0 0 0 4px #e74c3c,0 0 0 8px rgba(231,76,60,0.4),0 0 30px rgba(231,76,60,0.5)!important;}
#next-btn.hl-target{position:fixed!important;}
@keyframes nameShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
</style>
</head>
<body>
<div id="chem-bg"><div class="particle" style="top:15%;left:10%;animation-delay:0s;"></div><div class="particle" style="top:30%;left:30%;animation-delay:0.8s;"></div><div class="particle" style="top:50%;left:55%;animation-delay:1.5s;"></div><div class="particle" style="top:40%;left:75%;animation-delay:0.3s;"></div><div class="particle" style="top:65%;left:85%;animation-delay:2s;"></div><div class="particle" style="top:25%;left:50%;animation-delay:1.2s;"></div></div>
<div id="toast-c"></div>
<div id="tut-ov" onclick="G.tutClick()"></div>
<div id="tut-tip" onclick="G.tutClick()"><div id="tut-text"></div><div class="tut-next">▼ 點擊繼續</div></div>
<div id="hud">
  <div class="stat-box" onclick="UI.help('funds')"><span class="stat-label">💰 資金</span><span class="stat-val gold" id="h-funds">2,000</span></div>
  <div class="stat-box" onclick="UI.help('rep')"><span class="stat-label">🏆 聲譽</span><span class="stat-val teal" id="h-rep">50</span></div>
  <div class="stat-box" onclick="UI.help('tech')"><span class="stat-label">🔬 技術</span><span class="stat-val" id="h-tech">10</span></div>
  <div class="stat-box" onclick="UI.help('esg')"><span class="stat-label">🌿 ESG</span><span class="stat-val green" id="h-esg">20</span></div>
  <div class="stat-box" onclick="UI.help('poll')"><span class="stat-label">☣️ 污染</span><span class="stat-val purple" id="h-poll">0</span></div>
</div>
<div id="info-bar">
  <div id="info-bar-story" onclick="UI.stageDetail()" style="cursor:pointer;"><div class="bar-title">📋 任務簡報</div><div id="story-text" style="font-size:10px;">...</div></div>
  <div id="info-bar-goals"><div class="bar-title">🏆 階段目標</div><div id="goal-list"></div></div>
</div>
<div id="game-stage"><div id="factory-view">
  <div id="year-display">1972年</div><div id="stage-badge">第一階段</div>
  <div id="zdhc-badge" style="display:none;position:absolute;top:36px;right:8px;padding:2px 10px;background:linear-gradient(135deg,rgba(200,146,42,0.92),rgba(180,120,20,0.92));color:#fff;font-size:10px;font-weight:700;border-radius:10px;letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,0.2);z-index:92;">🏅 ZDHC認證</div>
  <div id="factory-grid"></div>
  <div id="data-overlay">
    <div class="drow"><span>年營收</span><span class="dval" id="s-rev">$0</span></div>
    <div class="drow"><span>工廠數</span><span class="dval" id="s-fac">0</span></div>
    <div class="dsep"></div>
    <div class="drow"><span>原料庫存</span><span class="dval" id="s-mat">0</span></div>
    <div class="drow"><span>年污染</span><span class="dval" id="s-polly">+0</span></div>
    <div class="drow"><span>出口國</span><span class="dval" id="s-exp">0國</span></div>
  </div>
  <div id="poll-bar"><div id="poll-fill" style="width:0;background:#2e8b57;"></div><span id="poll-label">☣️ 0</span></div>
</div></div>
<div id="next-btn" onclick="G.nextTurn()">下一<br>年度</div>
<div id="bottom-panel">
  <div class="tabs">
    <button class="tab-b active" id="tb-build" onclick="UI.tab('build')">🏭 建設</button>
    <button class="tab-b" id="tb-trade" onclick="UI.tab('trade')">🌍 國際貿易</button>
  </div>
  <div id="tc-build" class="tab-c active"><div id="build-deck" class="deck"></div></div>
  <div id="tc-trade" class="tab-c"><div id="trade-deck" class="deck"></div></div>
</div>
<div id="modal-ov"><div class="mdlg"><div class="mdlg-in">
  <div id="m-title" style="font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:var(--teal);margin-bottom:8px;"></div>
  <div id="m-body"></div>
  <div id="m-foot"><button class="mbtn" id="m-btn" onclick="UI.closeModal()">確 定</button></div>
</div></div></div>
<div id="name-ov">
  <div style="text-align:center;max-width:340px;width:100%;">
    <div style="font-size:44px;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));">🧪</div>
    <div style="font-size:22px;font-weight:900;color:#ffffff;font-family:'Noto Serif TC',serif;letter-spacing:3px;margin-bottom:5px;text-shadow:0 2px 10px rgba(0,0,0,0.4);">觀音的化學力量</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:2px;margin-bottom:28px;font-family:'LXGW WenKai TC',serif;">永光化學 · 企業策略模擬</div>
    <div id="name-box" style="background:rgba(232,240,248,0.93);border:2px solid rgba(255,255,255,0.5);border-radius:14px;padding:18px 16px;text-align:left;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <div style="font-family:'Noto Serif TC',serif;font-size:13px;color:var(--teal);font-weight:700;margin-bottom:6px;">📋 接受策略長任命</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.6;">桃園觀音，1972年。<br>請輸入您的姓名，踏上化工業的征途。</div>
      <div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.6);border:1.5px solid var(--brd);border-radius:9px;padding:8px 12px;">
        <span style="font-size:18px;">👤</span>
        <input id="p-name" type="text" maxlength="12" placeholder="輸入您的名字…" style="flex:1;min-width:0;background:transparent;border:none;color:var(--txt);font-size:16px;padding:4px 2px;outline:none;font-family:'Noto Serif TC',serif;letter-spacing:2px;" onkeydown="if(event.key==='Enter')G.confirmName()"/>
      </div>
    </div>
    <button onclick="G.confirmName()" style="margin-top:14px;width:100%;padding:13px;background:var(--teal);border:none;color:#fff;font-size:14px;font-family:'Noto Serif TC',serif;font-weight:700;letter-spacing:3px;cursor:pointer;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.25);transition:opacity 0.2s;">🧪 接受任命，啟程 1972</button>
  </div>

    UI.renderBuild();UI.renderTrade();UI.updateAll();},

  buyMat(sid){if(this.tutStep!==0)return;const s=SUP.find(x=>x.id===sid);
    const mkt=this.matMarket[sid]||1.0;
    const price=Math.floor(s.base*mkt*(0.88+Math.random()*0.24));
    if(this.funds<price){UI.toast('💸 資金不足（市價$'+price+'）','bad');return;}
    if(this.materials>=this.matCap){UI.toast('📦 倉庫已滿','bad');return;}
    this.matBuys[sid]=(this.matBuys[sid]||0)+1;
    if(s.route==='risk'&&Math.random()<0.2){UI.toast('⚠️ '+s.flag+' 品質問題！原料僅+25','warn');this.funds-=price;this.materials=Math.min(this.matCap,this.materials+25);UI.renderTrade();UI.updateAll();return;}
    this.funds-=price;this.materials=Math.min(this.matCap,this.materials+50);
    UI.toast(s.flag+' 原料+50 -$'+price,'good');UI.renderTrade();UI.updateAll();},

  tryContract(cid){if(this.tutStep!==0)return;if(this.done.includes(cid)){UI.toast('已完成此訂單','warn');return;}
    let ct=null;for(let s=1;s<=5;s++){ct=(CONTRACTS[s]||[]).find(x=>x.id===cid);if(ct)break;}if(!ct)return;
    const r=ct.reqs;let ok=true;let miss=[];
    if(r.dye&&this.c.dye<r.dye){ok=false;miss.push('染料≥'+r.dye);}
    if(r.spec&&this.c.spec<r.spec){ok=false;miss.push('特化≥'+r.spec);}
    if(r.elec&&this.c.elec<r.elec){ok=false;miss.push('電子≥'+r.elec);}
    if(r.toner&&this.c.toner<r.toner){ok=false;miss.push('碳粉≥'+r.toner);}
    if(r.tech&&this.tech<r.tech){ok=false;miss.push('技術≥'+r.tech);}
    if(r.esg&&this.esg<r.esg){ok=false;miss.push('ESG≥'+r.esg);}
    if(r.maxPoll!==undefined&&this.poll>r.maxPoll){ok=false;miss.push('污染≤'+r.maxPoll);}
    if(!ok){UI.toast('❌ 未達標：'+miss.join('、'),'bad');return;}
    this.done.push(cid);this.funds+=ct.rwd.funds;this.rep=Math.min(100,this.rep+ct.rwd.rep);
    this.countries.add(ct.country);
    UI.toast(ct.flag+' '+ct.client+' 出口成功！+$'+ct.rwd.funds,'good');
    UI.renderTrade();UI.updateAll();},

  nextTurn(){
    if(this.tutStep!==0)return;
    this.year++;
    const msgs=[];/* collect turn events for the story report modal */
    /* 1. Pollution */
    const pollD=this.calcPollPerTurn();
    this.poll=Math.max(0,this.poll+pollD);
    /* 1b. ESG DECAY — pollution pressure erodes ESG score each year */
    const esgDecay=Math.floor(this.poll/20);
    if(esgDecay>0){this.esg=Math.max(0,this.esg-esgDecay);if(esgDecay>=2)msgs.push({type:'warn',text:'☣️ 高污染侵蝕 ESG -'+esgDecay});}
    /* 1c. Market price fluctuation — per-supplier swing rates */
    SUP.forEach(s=>{
      let drift=(Math.random()-0.5)*s.swing;
      if(s.id==='cn'&&this.stageIdx>=3)drift+=(Math.random()-0.4)*0.15;/* geopolitical risk late game */
      if(s.id==='basf'&&this.stageIdx>=2)drift+=0.015;/* EU carbon pricing trend */
      this.matMarket[s.id]=Math.max(0.55,Math.min(2.2,this.matMarket[s.id]+drift));
    });
    /* 1d. Manager auto-buy */
    let mgrReport=null;
    if(this.managerActive){
      const buyResult=this.managerBuy();
      const advice=this.managerAdvice();
      mgrReport='<b>採購：</b>'+buyResult+'<br><b>💡 建議：</b>'+advice;
    }
    /* 2. Costs */
    const maint=this.totalFac()*30+(this.managerActive?60:0);
    this.funds-=maint;
    let cTax=0;
    if(this.stageIdx>=3){cTax=this.poll*3;this.funds-=cTax;}
    /* 3. Materials & Revenue */
    const need=this.calcMatNeed();let rev=this.calcRev();
    if(need>0&&this.materials<need){
      const ratio=need>0?this.materials/need:0;
      rev=Math.max(MIN_INC,Math.floor(rev*Math.max(0.3,ratio)));/* FIX#1: at least 30% revenue or MIN_INC */
      this.materials=0;msgs.push({type:'warn',text:'⚠️ 原料不足，工廠減產！聲譽 -2'});this.rep=Math.max(0,this.rep-2);
    }else{this.materials=Math.max(0,this.materials-need);}
    /* 4. Income: revenue + base + minimum guarantee */
    const totalInc=rev+BASE_INC[this.stageIdx];
    this.funds+=totalInc;
    if(this.funds<0)this.funds=0;
    /* 5. Record history for chart */
    this.history.push({year:this.year,esg:this.esg,poll:this.poll,rev:totalInc,funds:this.funds});
    /* 6. Pollution consequences — collect into msgs */
    this.pollConsequences(msgs);
    /* 7. Random event */
    const ev=this.rollEvent();
    /* 8. Rep check */
    if(this.rep<=0){UI.showGameOver();return;}
    /* 9. Stage check */
    const stage=STAGES[this.stageIdx];
    if(stage&&stage.goals.every(g=>g.ck(this))){
      if(this.stageIdx<STAGES.length-1){const ci=this.stageIdx;this.stageIdx++;UI.updateAll();UI.showStageComplete(ci,STAGES[this.stageIdx]);return;}
      else{UI.showVictory();return;}
    }
    /* Always show turn report first; if event exists it is shown after closing */
    UI.showTurnReport(totalInc,maint,cTax,pollD,mgrReport,msgs,ev);
    UI.renderBuild();UI.renderTrade();UI.updateAll();
  },

  pollConsequences(msgs){
    if(this.poll>=30&&this.poll<50&&Math.random()<0.35){const f=100+Math.floor(Math.random()*150);this.funds=Math.max(0,this.funds-f);msgs.push({type:'warn',text:'⚠️ 環保警告罰款 -$'+f});}
    if(this.poll>=50&&this.poll<70){this.rep=Math.max(0,this.rep-3);if(Math.random()<0.4){const f=300+Math.floor(Math.random()*200);this.funds=Math.max(0,this.funds-f);msgs.push({type:'bad',text:'💧 水污染罰款 -$'+f+'，聲譽 -3'});}}
    if(this.poll>=70){this.rep=Math.max(0,this.rep-8);this.funds=Math.max(0,this.funds-500);msgs.push({type:'bad',text:'☣️ 嚴重污染！罰款 $500，聲譽 -8'});
      if(Math.random()<0.3){const facs=BKEYS.filter(k=>B[k].rev>0&&this.c[k]>0);if(facs.length){const f=facs[Math.floor(Math.random()*facs.length)];this.c[f]--;msgs.push({type:'bad',text:'⛔ '+B[f].name+' 被強制關閉！'});}}}
    if(this.poll>=90){this.rep=Math.max(0,this.rep-10);msgs.push({type:'bad',text:'⛔ 政府介入調查！聲譽 -10'});}
  },
  rollEvent(){
    const pool=EVENTS[this.stageIdx];if(!pool||!pool.length)return null;
    if(!this.shownEvents[this.stageIdx])this.shownEvents[this.stageIdx]=new Set();
    const shown=this.shownEvents[this.stageIdx];
    /* Build available indices: skip ZDHC event if already certified */
    const avail=[];
    for(let i=0;i<pool.length;i++){
      if(shown.has(i))continue;
      if(pool[i].id==='nike_zdhc'&&this.c.zdhc>=1)continue;/* certified: never show again */
      avail.push(i);
    }
    /* All unseen events exhausted: reset bag (keep permanent exclusions) */
    if(avail.length===0){
      shown.clear();
      for(let i=0;i<pool.length;i++){
        if(pool[i].id==='nike_zdhc'&&this.c.zdhc>=1)continue;
        avail.push(i);
      }
      if(avail.length===0)return null;
    }
    const idx=avail[Math.floor(Math.random()*avail.length)];
    shown.add(idx);this.lastEvIdx[this.stageIdx]=idx;
    return pool[idx];
  },
  applyEff(eff){if(!eff)return;if(eff.funds)this.funds+=eff.funds;if(eff.rep)this.rep+=eff.rep;if(eff.tech)this.tech+=eff.tech;if(eff.esg)this.esg+=eff.esg;if(eff.poll)this.poll=Math.max(0,this.poll+eff.poll);this.rep=Math.max(0,Math.min(100,this.rep));this.esg=Math.max(0,Math.min(100,this.esg));if(this.funds<0)this.funds=0;},
  restart(){this.resetVars();UI.renderBuild();UI.renderTrade();UI.updateAll();UI.closeModal();setTimeout(()=>UI.showModal('🔄 重新開始','<div style="font-size:13px;text-align:center;padding:8px 0;">準備回到1972年，再次出發！</div>',()=>{UI.closeModal();G.startTut();}),300);},
  captureScreen(){const el=document.querySelector('.mdlg-in');if(!el)return;html2canvas(el,{backgroundColor:'#e8f0f8',scale:2}).then(c=>{const a=document.createElement('a');a.download='永光化學_'+this.playerName+'.png';a.href=c.toDataURL('image/png');a.click();});},

  /* ===== MANAGER AUTO-BUY ===== */
  managerBuy(){
    const need=this.calcMatNeed()*2;
    if(this.materials>=Math.min(this.matCap*0.8,need))return'倉庫充足，本年未採購';
    const batches=Math.min(3,Math.floor((this.matCap-this.materials)/50));
    if(batches===0)return'倉庫已滿，跳過';
    const priced=SUP.map(s=>({...s,ep:Math.floor(s.base*(this.matMarket[s.id]||1))})).sort((a,b)=>a.ep-b.ep);
    const bought=[];
    for(let i=0;i<batches&&this.materials<this.matCap;i++){
      /* 60% cheapest, 40% random diversification */
      const pick=Math.random()<0.60?priced[0]:priced[Math.floor(Math.random()*priced.length)];
      const price=Math.floor(pick.base*(this.matMarket[pick.id]||1)*(0.88+Math.random()*0.24));
      if(this.funds<price)break;
      if(pick.route==='risk'&&Math.random()<0.2){
        this.funds-=price;this.materials=Math.min(this.matCap,this.materials+25);
        this.matBuys[pick.id]=(this.matBuys[pick.id]||0)+1;
        bought.push(pick.flag+'$'+price+'⚠️');
      }else{
        this.funds-=price;this.materials=Math.min(this.matCap,this.materials+50);
        this.matBuys[pick.id]=(this.matBuys[pick.id]||0)+1;
        bought.push(pick.flag+'$'+price);
      }
    }
    return bought.length?'採購：'+bought.join(' ・ '):'資金不足，未採購';
  },

  /* ===== MANAGER ADVICE ===== */
  managerAdvice(){
    const tips=[];
    /* Pollution — most urgent */
    if(this.poll>=70)tips.push('⛔ 污染嚴重！面臨強制關廠風險，立即投資環保設施並考慮減少高污染工廠。');
    else if(this.poll>=50)tips.push('⚠️ 污染偏高，碳稅壓力沉重。優先建廢水回收或循環經濟設施。');
    else if(this.poll>=30)tips.push('📊 污染進入黃色警戒，趁早投資綠色設施可省下未來罰款。');
    /* ESG deficit by stage */
    if(this.esg<30&&this.stageIdx>=2)tips.push('🌿 ESG不足30！第三階段後多數訂單有ESG門檻，請盡速建設環保設施。');
    else if(this.esg<50&&this.stageIdx>=3)tips.push('🌿 ESG低於50，Nike與歐盟REACH認證訂單將無法承接。');
    /* Material shortage */
    const need=this.calcMatNeed();
    if(need>0&&this.materials<need)tips.push('📦 原料嚴重不足，工廠正在減產！已嘗試補貨，請確認資金是否足夠購買原料。');
    else if(need>0&&this.materials<need*1.5)tips.push('📦 原料庫存偏低，本年已自動補貨，建議維持2倍需求的安全庫存。');
    /* Fund alert */
    if(this.funds<300)tips.push('💸 資金危急！暫緩新建設，優先讓工廠維持運轉。');
    else if(this.funds<800&&this.totalFac()<3)tips.push('💰 資金偏緊，建議先接1～2筆國際訂單補充收入，再擴建工廠。');
    /* R&D missing */
    if(this.c.rd===0&&this.funds>=1200)tips.push('🔬 尚無研發中心！投資研發中心技術+12，可解鎖更多進階建設。');
    /* Stage specific */
    if(this.stageIdx===0&&this.c.dye<3)tips.push('🎨 第一階段目標需3座染料廠，優先蓋染料工廠。');
    else if(this.stageIdx===1&&this.c.spec<2)tips.push('🛡️ 特化工廠是Eversorb®車廠大訂單的門票，建議加緊建設。');
    else if(this.stageIdx===2&&this.c.elec<2)tips.push('💎 電子材料廠是進入半導體供應鏈的關鍵，建議盡快升級！');
    else if(this.stageIdx===3&&this.c.zdhc===0&&this.tech>=40&&this.esg>=40)tips.push('🏅 技術與ESG均已達標！立即申請ZDHC認證，ESG一次+18！');
    else if(this.stageIdx===4&&this.c.global<2)tips.push('🌐 最終階段需2座海外據點，建議盡快擴大全球佈局。');
    /* Market insight */
    const cnMkt=this.matMarket['cn']||1.0;const basfMkt=this.matMarket['basf']||1.0;
    if(cnMkt>1.4)tips.push('🇨🇳 中國原料大漲（+'+Math.round((cnMkt-1)*100)+'%），建議改採台灣或巴斯夫原料。');
    else if(basfMkt<0.85)tips.push('🇩🇪 巴斯夫原料處於低價（-'+Math.round((1-basfMkt)*100)+'%），現在是補貨好時機！');
    /* Fallback */
    if(tips.length===0)tips.push('✅ 公司目前運作良好！繼續執行現有策略，穩紮穩打邁向下一階段。');
    return tips[0];
  },

  showEvent(ev){
    let html='<div style="font-size:14px;font-weight:700;color:'+(ev.tone==='bad'?'var(--red)':ev.tone==='good'?'var(--green)':'var(--gold)')+';margin-bottom:6px;">'+ev.hl+'</div>';

    if(ev.eff&&!ev.choices){G.applyEff(ev.eff);let et=[];if(ev.eff.funds)et.push('資金'+(ev.eff.funds>0?'+':'')+ev.eff.funds);if(ev.eff.rep)et.push('聲譽'+(ev.eff.rep>0?'+':'')+ev.eff.rep);if(ev.eff.tech)et.push('技術'+(ev.eff.tech>0?'+':'')+ev.eff.tech);if(ev.eff.esg)et.push('ESG'+(ev.eff.esg>0?'+':'')+ev.eff.esg);

    if(ev.choices&&ev.choices.length){
      if(ev.eff)G.applyEff(ev.eff);
      this.showModal(ev.tone==='bad'?'⚠️ 事件':'📰 事件',html,null);
      const foot=document.getElementById('m-foot');foot.innerHTML='';
      ev.choices.forEach(ch=>{
        const btn=document.createElement('div');btn.className='ch-btn';
        btn.innerHTML='<div class="ch-title">'+ch.label+'</div><div class="ch-desc">'+ch.desc+'</div>';
        if(ch.certify){
          /* ZDHC certification choice — check conditions first */
          btn.onclick=()=>{
            if(G.c.zdhc>=1){UI.toast('🏅 已完成ZDHC認證','warn');this.closeModal();UI.updateAll();return;}
            if(G.tech<40||G.esg<40){
              UI.toast('❌ 條件未達標！需技術≥40（目前'+G.tech+'）且ESG≥40（目前'+G.esg+'）','bad',3500);
              return;/* keep modal open so they can pick the other choice */
            }
            if(G.funds<1200){UI.toast('❌ 資金不足 $1,200！','bad');return;}
            G.c.zdhc=1;G.funds=Math.max(0,G.funds-1200);
            G.esg=Math.min(100,G.esg+18);G.poll=Math.max(0,G.poll-3);G.rep=Math.min(100,G.rep+8);
            this.closeModal();
            UI.toast('🏅 ZDHC零排放化學品認證完成！ESG+18 污染-3 聲譽+8','good',4000);
            UI.updateAll();UI.renderBuild();
          };
        }else{
          btn.onclick=()=>{G.applyEff(ch.fx);this.closeModal();UI.updateAll();UI.renderBuild();};
        }
        foot.appendChild(btn);
      });
    }else{this.showModal(ev.tone==='bad'?'⚠️ 事件':'📰 事件',html,()=>{this.closeModal();UI.updateAll();});}
  },

    html+='✅ 鈣鈦礦太陽能封裝材料獲瑞士國際大獎<br>';
    html+='✅ 創辦人陳定川：「追求進步創新，發揚人性光輝」</div>';
    this.saveToSheets();/* 自動儲存成績至 Google 試算表 */
    this.showModal('🏆 任務完成',html,null);
    document.getElementById('m-foot').innerHTML='<button class="mbtn gold" onclick="G.captureScreen()">📸 截圖留念</button><button class="mbtn" onclick="G.restart()" style="margin-top:6px;">🔄 再玩一次</button>';
  },

  /* SVG TREND CHART */
  buildChart(){
    const h=G.history;if(h.length<2)return '';
    const W=300,H=120,P=22;
    /* Use actual max so values never go out of range */
    const maxEsg=Math.max(100,...h.map(d=>d.esg));
    const maxPoll=Math.max(50,...h.map(d=>d.poll));
    const maxRev=Math.max(100,...h.map(d=>d.rev));
    const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    const toY=(v,max)=>clamp(P+((H-2*P)*(1-v/max)),P,H-P);
    const toX=(i)=>P+(W-2*P)*i/(h.length-1);
    let esgPts='',pollPts='',revPts='';
    h.forEach((d,i)=>{
      const x=toX(i);
      esgPts+=x+','+toY(d.esg,maxEsg)+' ';
      pollPts+=x+','+toY(d.poll,maxPoll)+' ';
      revPts+=x+','+toY(d.rev,maxRev)+' ';
    });
    let svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;margin:6px 0;background:rgba(0,0,0,0.03);border-radius:8px;" overflow="hidden">';
    /* clipPath keeps lines inside the plot area */
    svg+='<defs><clipPath id="cp"><rect x="'+P+'" y="'+P+'" width="'+(W-2*P)+'" height="'+(H-2*P)+'"/></clipPath></defs>';
    /* Grid lines */
    for(let i=0;i<=4;i++){const y=P+(H-2*P)*i/4;svg+='<line x1="'+P+'" y1="'+y+'" x2="'+(W-P)+'" y2="'+y+'" stroke="#ddd" stroke-width="0.5"/>';}
    /* Lines inside clipPath */
    svg+='<g clip-path="url(#cp)">';
    svg+='<polyline points="'+esgPts+'" fill="none" stroke="#2e8b57" stroke-width="2" opacity="0.85"/>';
    svg+='<polyline points="'+pollPts+'" fill="none" stroke="#c2625a" stroke-width="2" opacity="0.85"/>';
    svg+='<polyline points="'+revPts+'" fill="none" stroke="#c8922a" stroke-width="2" opacity="0.85" stroke-dasharray="4 2"/>';
    svg+='</g>';
    /* Legend */
    svg+='<text x="'+P+'" y="13" font-size="9" fill="#2e8b57" font-family="sans-serif">🌿ESG</text>';
    svg+='<text x="'+(P+55)+'" y="13" font-size="9" fill="#c2625a" font-family="sans-serif">☣️污染</text>';
    svg+='<text x="'+(P+110)+'" y="13" font-size="9" fill="#c8922a" font-family="sans-serif">💰年收(虛線)</text>';
    /* Year labels */
    if(h.length>0){svg+='<text x="'+P+'" y="'+(H-3)+'" font-size="8" fill="#888" font-family="sans-serif">'+h[0].year+'</text>';svg+='<text x="'+(W-P-22)+'" y="'+(H-3)+'" font-size="8" fill="#888" font-family="sans-serif">'+h[h.length-1].year+'</text>';}
    svg+='</svg>';
    return '<div style="margin:4px 0;"><div style="font-size:10px;font-weight:700;color:var(--teal);margin-bottom:2px;">📊 趨勢圖（ESG vs 污染 vs 年收入）</div>'+svg+'</div>';
  },

  help(type){const h={funds:'【💰 資金】\n每年收入=工廠營收+基礎收入-維護費。\n原料不足時減產，但有最低保障收入。\n第四階段起高污染會額外收碳稅。',rep:'【🏆 聲譽】\n國際客戶信任度，歸零即宣告倒閉。\n污染事故和環保違規會直接扣分。',tech:'【🔬 技術力】\n建造研發中心可大幅提升技術。\n高技術才能解鎖先進工廠與環保認證。',esg:'【🌿 ESG分數】\n投資環保設施（💧☀️♻️）時加分。\n🏅 ZDHC認證透過特殊事件申請，ESG一次+18！\n⚠️ 污染越高，ESG每年自動下滑越快！\n必須持續投資才能維持，後期國際訂單強制要求達標。',poll:'【☣️ 污染值】\n工廠每年產生污染，超標會罰款、傷聲譽甚至關廠。\n投資環保設施可每年持續降低污染。\n第四階段碳稅=污染×3，早降早省錢。'};
    this.showModal('❓ 說明','<div style="white-space:pre-line;font-size:13px;line-height:1.6;">'+((h[type])||'')+'</div>',()=>this.closeModal());},
  stageDetail(){const s=STAGES[G.stageIdx];const goals=s.goals.map(g=>'🔹 '+g.txt).join('<br>');this.showModal(s.title,'<div style="line-height:1.6;">'+s.desc+'<br><br><span style="color:var(--gold)">🏆 目標：</span><br>'+goals+'</div>',()=>this.closeModal());},
  hlEl(sel,text){document.getElementById('tut-ov').style.display='block';const el=document.querySelector(sel);if(el){el.classList.add('hl-target');const bp=el.closest('#bottom-panel')||el.closest('#hud');if(bp)bp.style.zIndex='2001';}document.getElementById('tut-text').innerHTML='<div class="tut-t">遊戲說明</div>'+text.replace(/\n/g,'<br>');document.getElementById('tut-tip').style.display='block';},
  clearHL(){document.getElementById('tut-ov').style.display='none';document.getElementById('tut-tip').style.display='none';document.querySelectorAll('.hl-target').forEach(el=>el.classList.remove('hl-target'));const bp=document.getElementById('bottom-panel');if(bp)bp.style.zIndex='100';const hud=document.getElementById('hud');if(hud)hud.style.zIndex='100';}
};
window.addEventListener('DOMContentLoaded',()=>G.init());
</script>
