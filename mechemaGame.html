<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🔋 美琪瑪 — 觀音的能源樞紐</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=LXGW+WenKai+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
:root{--bg:rgba(235,240,245,0.93);--bgs:#ebf0f5;--brd:#b0c4de;--teal:#2c5e7b;--gold:#b8860b;--red:#c0504d;--green:#3cb371;--purple:#778899;--txt:#2f4f4f;--muted:#708090;--light:#a9a9a9;}
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;user-select:none;}
body{font-family:'LXGW WenKai TC','Noto Serif TC',serif;width:100vw;height:100dvh;overflow:hidden;color:var(--txt);display:flex;flex-direction:column;background:#233544;}
#chem-bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(135deg,#1c2833 0%,#2c3e50 30%,#34495e 60%,#2c3e50 100%);}
.particle{position:absolute;width:4px;height:4px;background:rgba(135,206,250,0.5);border-radius:50%;animation:twinkle 3s ease-in-out infinite;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.3);}50%{opacity:1;transform:scale(1.5);}}
#hud{flex:0 0 auto;background:var(--bg);border-bottom:2px solid var(--brd);padding:4px;padding-top:max(4px,env(safe-area-inset-top));display:grid;grid-template-columns:repeat(5,1fr);gap:2px;z-index:100;position:relative;backdrop-filter:blur(12px);}
.stat-box{text-align:center;border:1.5px solid var(--brd);background:rgba(255,255,255,0.6);padding:2px 1px;border-radius:6px;cursor:pointer;transition:background 0.2s;position:relative;}
.stat-box:active{background:rgba(220,230,240,0.8);}
.stat-box.warn{background:rgba(255,200,50,0.15);border-color:#b8860b;}
.stat-box.danger{background:rgba(192,80,77,0.12);border-color:var(--red);}
.stat-label{font-size:9px;color:var(--muted);display:block;letter-spacing:0.5px;}
.stat-val{font-family:'Playfair Display',serif;font-size:15px;color:var(--txt);font-weight:bold;line-height:1;}
.stat-val.gold{color:#a07000;}.stat-val.teal{color:#2c5e7b;}.stat-val.green{color:#2e8b57;}.stat-val.red{color:#a03030;}.stat-val.purple{color:#556b2f;}
#info-bar{display:flex;width:100%;background:rgba(235,240,245,0.92);border-bottom:1.5px solid var(--brd);font-size:11px;line-height:1.3;z-index:90;flex-shrink:0;backdrop-filter:blur(8px);}
#info-bar-story{flex:1;padding:3px 6px;border-right:1px solid var(--brd);color:var(--txt);}
#info-bar-goals{flex:1;padding:3px 6px;}
#info-bar-story .bar-title{font-size:11px;color:var(--teal);font-weight:700;margin-bottom:1px;font-family:'Noto Serif TC',serif;}
#info-bar-goals .bar-title{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:1px;font-family:'Noto Serif TC',serif;}
.goal-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--txt);}
.goal-item .gc{font-size:11px;}.goal-item .gc.done{color:var(--green);font-weight:bold;}
#game-stage{flex:1;position:relative;display:flex;justify-content:center;align-items:center;overflow:hidden;width:100%;z-index:1;}
#factory-view{position:relative;width:100%;height:100%;transition:filter 0.5s;}
#factory-view.polluted{filter:sepia(0.3) hue-rotate(-30deg) brightness(0.9);}
#factory-view.very-polluted{filter:sepia(0.5) hue-rotate(-50deg) brightness(0.7) contrast(1.2);}
#year-display{position:absolute;top:8px;left:8px;padding:4px 12px;color:var(--txt);font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;z-index:92;pointer-events:none;background:rgba(235,240,245,0.85);border-radius:16px;border:1.5px solid var(--brd);backdrop-filter:blur(8px);letter-spacing:2px;}
#stage-badge{position:absolute;top:8px;right:8px;padding:3px 10px;color:#fff;font-family:'Noto Serif TC',serif;font-size:11px;font-weight:700;z-index:92;background:var(--teal);border-radius:12px;}
#cbam-badge{display:none;position:absolute;top:36px;right:8px;padding:2px 10px;background:linear-gradient(135deg,rgba(184,134,11,0.92),rgba(150,100,10,0.92));color:#fff;font-size:10px;font-weight:700;border-radius:10px;letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,0.2);z-index:92;}
#factory-grid{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:50px 10px 22px;overflow:hidden;}
.fac-zone{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);border-radius:8px;padding:5px 8px;min-height:36px;flex-wrap:wrap;}
.fac-zone-label{font-size:9px;color:rgba(255,255,255,0.55);width:26px;flex-shrink:0;text-align:right;padding-right:5px;border-right:1px solid rgba(255,255,255,0.2);margin-right:3px;letter-spacing:0.5px;}
.fac-tile{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.15);border-radius:6px;padding:3px 7px;cursor:default;border:1px solid rgba(255,255,255,0.1);}
.fac-tile .fe{font-size:18px;line-height:1;}.fac-tile .fc{font-size:11px;color:rgba(255,255,255,0.95);font-weight:bold;font-family:'Playfair Display',serif;}
.fac-empty{font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;padding-left:4px;}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
#data-overlay{position:absolute;bottom:22px;left:6px;background:rgba(235,240,245,0.9);border:1.5px solid var(--brd);padding:4px 6px;width:140px;z-index:95;pointer-events:none;border-radius:8px;backdrop-filter:blur(8px);}
.drow{font-size:10px;color:var(--muted);margin-bottom:1px;display:flex;justify-content:space-between;align-items:center;white-space:nowrap;}
.dval{color:var(--txt);font-weight:bold;font-family:'Playfair Display',serif;font-size:12px;}
.dval.bad{color:var(--red);}
.dsep{border-top:1px dashed var(--brd);margin:2px 0;}
#poll-bar{position:absolute;bottom:0;left:0;right:0;height:16px;background:rgba(0,0,0,0.2);z-index:96;display:flex;align-items:center;padding:0 4px;}
#poll-fill{height:10px;border-radius:5px;transition:width 0.4s,background 0.4s;min-width:2px;}
#poll-label{position:absolute;right:6px;font-size:9px;color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
#bottom-panel{flex:0 0 auto;background:var(--bg);border-top:2px solid var(--brd);height:220px;padding:3px 5px;padding-bottom:calc(3px + env(safe-area-inset-bottom));display:flex;flex-direction:column;z-index:100;position:relative;backdrop-filter:blur(12px);}
.tabs{display:flex;gap:6px;margin-bottom:0;flex-shrink:0;align-items:flex-end;border-bottom:1.5px solid var(--teal);}
.tab-b{flex:1;background:rgba(255,255,255,0.4);border:1.5px solid var(--brd);border-bottom:1.5px solid var(--teal);color:var(--muted);padding:5px;font-weight:700;font-size:12px;cursor:pointer;text-align:center;transition:all 0.25s;border-top-left-radius:8px;border-top-right-radius:8px;z-index:1;font-family:'LXGW WenKai TC',serif;letter-spacing:1px;}
.tab-b.active{background:rgba(44,94,123,0.1);border-color:var(--teal);border-bottom:1.5px solid var(--bg);color:var(--teal);margin-bottom:-1.5px;z-index:10;padding-bottom:7px;}
.tab-c{display:none;flex:1;overflow:hidden;flex-direction:column;margin-top:0;padding-top:3px;}
.tab-c.active{display:flex;}
.deck{display:flex;gap:3px;flex:1;width:100%;padding-top:3px;min-height:0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
.bcard{flex:0 0 78px;min-width:68px;position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.7) 0%,rgba(235,240,245,0.9) 100%);border:1.5px solid var(--brd);padding:2px 2px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:0;border-radius:8px;transition:all 0.2s;overflow:visible;}
.bcard:active{transform:scale(0.97);}.bcard.disabled{opacity:0.35;filter:grayscale(0.7);}
.bcard.green-card{border-color:var(--green);background:linear-gradient(180deg,rgba(220,250,230,0.7) 0%,rgba(200,240,210,0.9) 100%);}
.bcard .badge{position:absolute;top:-4px;right:-4px;background:var(--teal);color:#fff;border:1.5px solid #fff;border-radius:8px;font-family:'Playfair Display',serif;font-size:12px;font-weight:bold;padding:0 5px;z-index:10;}
.bcard .emoji{font-size:18px;margin-top:1px;}.bcard .name{font-size:10px;text-align:center;white-space:nowrap;color:var(--txt);font-weight:700;font-family:'Noto Serif TC',serif;}
.bcard .divider{width:60%;height:1px;background:var(--brd);margin:1px 0;}
.bcard .info{font-size:9px;color:var(--muted);text-align:center;line-height:1.2;}
.bcard .cost{font-family:'Playfair Display',serif;color:var(--gold);font-size:12px;font-weight:bold;margin-top:auto;}
.bcard .poll-cost{font-size:9px;color:var(--red);font-weight:700;}
.lock-ov{position:absolute;inset:0;background:rgba(235,240,245,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:10px;font-weight:bold;z-index:5;text-align:center;border-radius:8px;}
.tcard{flex:0 0 88px;min-width:78px;position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.7) 0%,rgba(235,240,245,0.9) 100%);border:1.5px solid var(--brd);padding:4px;display:flex;flex-direction:column;align-items:center;gap:1px;border-radius:8px;cursor:pointer;transition:all 0.2s;}
.tcard:active{transform:scale(0.97);background:rgba(44,94,123,0.08);}
.tcard.done{opacity:0.4;border-color:var(--green);}
.tcard .flag{font-size:22px;}.tcard .cname{font-size:10px;font-weight:700;color:var(--txt);text-align:center;}
.tcard .creq{font-size:8px;color:var(--muted);text-align:center;line-height:1.2;}
.tcard .crwd{font-size:10px;color:var(--gold);font-weight:700;margin-top:auto;}
.sep-label{flex:0 0 auto;writing-mode:vertical-rl;font-size:10px;color:var(--teal);font-weight:700;padding:4px 2px;display:flex;align-items:center;border-right:1.5px dashed var(--brd);margin-right:3px;}
#next-btn{position:fixed;bottom:calc(230px + env(safe-area-inset-bottom));right:12px;width:56px;height:56px;background:var(--teal);border:2.5px solid #fff;border-radius:50%;box-shadow:0 3px 12px rgba(0,0,0,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:150;cursor:pointer;font-size:11px;font-weight:700;text-align:center;line-height:1.1;animation:pulse-btn 2s ease-in-out infinite;font-family:'LXGW WenKai TC',serif;color:#fff;letter-spacing:1px;}
#next-btn:active{transform:scale(0.95);}
@keyframes pulse-btn{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
#toast-c{position:fixed;top:calc(108px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);width:260px;pointer-events:none;z-index:1500;display:flex;flex-direction:column;gap:5px;}
.toast{background:rgba(235,240,245,0.95);color:var(--txt);border-left:3px solid var(--light);padding:5px 10px;font-family:'LXGW WenKai TC',serif;font-size:12px;border-radius:8px;backdrop-filter:blur(8px);opacity:0;transform:translateY(-8px);animation:tIn 0.3s forwards;transition:all 0.4s ease;}
.toast.good{border-color:var(--green);}.toast.bad{border-color:var(--red);color:var(--red);}.toast.warn{border-color:var(--gold);color:#8a6a10;}
@keyframes tIn{to{opacity:1;transform:translateY(0);}}
.toast.hiding{opacity:0;transform:translateX(10px);max-height:0;padding:0;margin:0;border:none;}
#modal-ov{position:fixed;inset:0;background:rgba(15,25,35,0.65);z-index:3000;display:none;justify-content:center;align-items:center;padding:15px;backdrop-filter:blur(4px);}
.mdlg{background:linear-gradient(135deg,var(--teal),#3a7a9a);border:2px solid rgba(255,255,255,0.5);padding:3px;width:95%;max-width:380px;max-height:88vh;box-shadow:0 12px 40px rgba(0,0,0,0.25);display:flex;flex-direction:column;border-radius:14px;}
.mdlg-in{background:var(--bgs);border:1px solid var(--brd);padding:14px;text-align:center;overflow-y:auto;border-radius:12px;}
.mbtn{margin-top:10px;background:rgba(44,94,123,0.1);color:var(--txt);border:1.5px solid var(--brd);padding:9px 18px;cursor:pointer;font-size:14px;width:100%;font-family:'Noto Serif TC',serif;font-weight:700;border-radius:10px;transition:all 0.2s;letter-spacing:2px;}
.mbtn:active{transform:scale(0.97);background:rgba(44,94,123,0.2);}
.mbtn.gold{background:rgba(184,134,11,0.12);color:var(--gold);border-color:var(--gold);}
.mbtn.red{background:rgba(192,80,77,0.1);color:var(--red);border-color:var(--red);}
.ch-btn{background:rgba(44,94,123,0.06);border:1.5px solid var(--brd);padding:8px 10px;cursor:pointer;font-size:12px;text-align:left;font-family:'LXGW WenKai TC',serif;border-radius:8px;transition:all 0.2s;color:var(--txt);line-height:1.4;margin-top:6px;}
.ch-btn:active{background:rgba(44,94,123,0.15);border-color:var(--teal);}
.ch-title{font-weight:700;color:var(--teal);margin-bottom:2px;}
.ch-desc{font-size:11px;color:var(--muted);}
#name-ov{display:none;position:fixed;inset:0;z-index:6000;background:linear-gradient(135deg,#1c2833 0%,#2c3e50 35%,#34495e 65%,#2c3e50 100%);flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#tut-ov{position:fixed;inset:0;background:rgba(15,25,35,0.72);z-index:2000;display:none;cursor:pointer;backdrop-filter:blur(3px);}
#tut-tip{position:fixed;top:30%;left:50%;transform:translateX(-50%);background:rgba(235,240,245,0.97);color:var(--txt);padding:16px 18px;border-radius:14px;font-weight:600;z-index:2002;display:none;box-shadow:0 8px 30px rgba(0,0,0,0.2);text-align:center;width:80%;animation:fTip 2s ease-in-out infinite alternate;cursor:pointer;font-family:'LXGW WenKai TC',serif;line-height:1.6;}
.tut-t{color:var(--teal);font-size:14px;margin-bottom:6px;border-bottom:1.5px solid var(--brd);padding-bottom:3px;font-family:'Noto Serif TC',serif;font-weight:700;letter-spacing:2px;}
@keyframes fTip{from{transform:translate(-50%,0);}to{transform:translate(-50%,-8px);}}
.tut-next{font-size:10px;color:var(--light);margin-top:6px;}
.hl-target{z-index:2001!important;position:relative!important;box-shadow:0 0 0 4px #e74c3c,0 0 0 8px rgba(231,76,60,0.4),0 0 30px rgba(231,76,60,0.5)!important;}
#next-btn.hl-target{position:fixed!important;}
@keyframes nameShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
</style>
</head>
<body>
<div id="chem-bg"><div class="particle" style="top:15%;left:10%;animation-delay:0s;"></div><div class="particle" style="top:30%;left:30%;animation-delay:0.8s;"></div><div class="particle" style="top:50%;left:55%;animation-delay:1.5s;"></div><div class="particle" style="top:40%;left:75%;animation-delay:0.3s;"></div><div class="particle" style="top:65%;left:85%;animation-delay:2s;"></div><div class="particle" style="top:25%;left:50%;animation-delay:1.2s;"></div></div>
<div id="toast-c"></div>
<div id="tut-ov" onclick="G.tutClick()"></div>
<div id="tut-tip" onclick="G.tutClick()"><div id="tut-text"></div><div class="tut-next">▼ 點擊繼續</div></div>
<div id="hud">
  <div class="stat-box" onclick="UI.help('funds')"><span class="stat-label">💰 資金</span><span class="stat-val gold" id="h-funds">1,500</span></div>
  <div class="stat-box" onclick="UI.help('rep')"><span class="stat-label">🏆 聲譽</span><span class="stat-val teal" id="h-rep">50</span></div>
  <div class="stat-box" onclick="UI.help('tech')"><span class="stat-label">🔬 技術</span><span class="stat-val" id="h-tech">5</span></div>
  <div class="stat-box" onclick="UI.help('esg')"><span class="stat-label">🌿 ESG</span><span class="stat-val green" id="h-esg">20</span></div>
  <div class="stat-box" onclick="UI.help('poll')"><span class="stat-label">☣️ 污染</span><span class="stat-val purple" id="h-poll">0</span></div>
</div>
<div id="info-bar">
  <div id="info-bar-story" onclick="UI.stageDetail()" style="cursor:pointer;"><div class="bar-title">📋 營運簡報</div><div id="story-text" style="font-size:10px;">...</div></div>
  <div id="info-bar-goals"><div class="bar-title">🏆 階段目標</div><div id="goal-list"></div></div>
</div>
<div id="game-stage"><div id="factory-view">
  <div id="year-display">1992年</div><div id="stage-badge">第一階段</div>
  <div id="cbam-badge">🏅 CBAM 認證</div>
  <div id="factory-grid"></div>
  <div id="data-overlay">
    <div class="drow"><span>年營收</span><span class="dval" id="s-rev">$0</span></div>
    <div class="drow"><span>廠房數</span><span class="dval" id="s-fac">0</span></div>
    <div class="dsep"></div>
    <div class="drow"><span>金屬礦存</span><span class="dval" id="s-mat">0</span></div>
    <div class="drow"><span>年污染</span><span class="dval" id="s-polly">+0</span></div>
    <div class="drow"><span>出口國</span><span class="dval" id="s-exp">0國</span></div>
  </div>
  <div id="poll-bar"><div id="poll-fill" style="width:0;background:#2e8b57;"></div><span id="poll-label">☣️ 0</span></div>
</div></div>
<div id="next-btn" onclick="G.nextTurn()">下一<br>年度</div>
<div id="bottom-panel">
  <div class="tabs">
    <button class="tab-b active" id="tb-build" onclick="UI.tab('build')">🏭 建設產線</button>
    <button class="tab-b" id="tb-trade" onclick="UI.tab('trade')">🌍 國際貿易</button>
  </div>
  <div id="tc-build" class="tab-c active"><div id="build-deck" class="deck"></div></div>
  <div id="tc-trade" class="tab-c"><div id="trade-deck" class="deck"></div></div>
</div>
<div id="modal-ov"><div class="mdlg"><div class="mdlg-in">
  <div id="m-title" style="font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:var(--teal);margin-bottom:8px;"></div>
  <div id="m-body"></div>
  <div id="m-foot"><button class="mbtn" id="m-btn" onclick="UI.closeModal()">確 定</button></div>
</div></div></div>
<div id="name-ov">
  <div style="text-align:center;max-width:340px;width:100%;">
    <div style="font-size:44px;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));">🔋</div>
    <div style="font-size:22px;font-weight:900;color:#ffffff;font-family:'Noto Serif TC',serif;letter-spacing:3px;margin-bottom:5px;text-shadow:0 2px 10px rgba(0,0,0,0.4);">觀音的能源樞紐</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:2px;margin-bottom:28px;font-family:'LXGW WenKai TC',serif;">美琪瑪國際 · 電動車電池材料模擬</div>
    <div id="name-box" style="background:rgba(235,240,245,0.93);border:2px solid rgba(255,255,255,0.5);border-radius:14px;padding:18px 16px;text-align:left;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <div style="font-family:'Noto Serif TC',serif;font-size:13px;color:var(--teal);font-weight:700;margin-bottom:6px;">📋 董事長室的任命</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.6;">桃園觀音，1992年。<br>從紡織觸媒起步，你的目標是打入全球電動車心臟。</div>
      <div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.6);border:1.5px solid var(--brd);border-radius:9px;padding:8px 12px;">
        <span style="font-size:18px;">👤</span>
        <input id="p-name" type="text" maxlength="12" placeholder="輸入您的名字…" style="flex:1;min-width:0;background:transparent;border:none;color:var(--txt);font-size:16px;padding:4px 2px;outline:none;font-family:'Noto Serif TC',serif;letter-spacing:2px;" onkeydown="if(event.key==='Enter')G.confirmName()"/>

  calcRev(){let r=0;BKEYS.forEach(k=>{if(B[k].rev>0&&this.c[k]>0)r+=B[k].rev*this.c[k];});return r;},
  calcMatNeed(){let n=0;BKEYS.forEach(k=>{if(B[k].rev>0&&this.c[k]>0)n+=10*this.c[k];});return n;},
  calcPollPerTurn(){let p=0;BKEYS.forEach(k=>{p+=B[k].poll*this.c[k];});return p;},
  totalFac(){return Object.values(this.c).reduce((a,b)=>a+b,0);},

  selectCard(key){if(this.tutStep!==0)return;const b=B[key];
    if(b.treq>this.tech){UI.toast('🔒 技術力不足(需≥'+b.treq+')','bad');return;}
    if(b.ereq&&b.ereq>this.esg){UI.toast('🔒 ESG不足(需≥'+b.ereq+')','bad');return;}
    if(b.max&&this.c[key]>=b.max){UI.toast('🏅 '+b.name+'已達上限','warn');return;}
    if(this.funds<b.cost){UI.toast('💸 資金不足','bad');return;}
    this.funds-=b.cost;this.c[key]++;this.buildLog.push({id:key,year:this.year});
    if(b.ot==='tech'){this.tech+=b.boost;UI.toast('🔬 實驗室建成！技術+'+b.boost,'good');}
    else if(b.ot==='esg'){this.esg=Math.min(100,this.esg+b.boost);const note=b.max?'（認證完成）':'';UI.toast(b.e+' '+b.name+'建成！ESG+'+b.boost+note,'good');}
    else{UI.toast('建設'+b.name+' -$'+b.cost,'good');}
    if(b.rev>0)this.matCap+=100;
    UI.renderBuild();UI.renderTrade();UI.updateAll();},

  buyMat(sid){if(this.tutStep!==0)return;const s=SUP.find(x=>x.id===sid);
    const mkt=this.matMarket[sid]||1.0;
    const price=Math.floor(s.base*mkt*(0.88+Math.random()*0.24));
    if(this.funds<price){UI.toast('💸 資金不足（市價$'+price+'）','bad');return;}
    if(this.materials>=this.matCap){UI.toast('📦 倉庫已滿','bad');return;}
    this.matBuys[sid]=(this.matBuys[sid]||0)+1;
    if(s.route==='risk'&&Math.random()<0.25){UI.toast('⚠️ '+s.flag+' 礦區動盪！原料僅+20','warn');this.funds-=price;this.materials=Math.min(this.matCap,this.materials+20);UI.renderTrade();UI.updateAll();return;}
    this.funds-=price;this.materials=Math.min(this.matCap,this.materials+50);
    UI.toast(s.flag+' 礦物原料+50 -$'+price,'good');UI.renderTrade();UI.updateAll();},

  tryContract(cid){if(this.tutStep!==0)return;if(this.done.includes(cid)){UI.toast('已完成此訂單','warn');return;}
    let ct=null;for(let s=1;s<=5;s++){ct=(CONTRACTS[s]||[]).find(x=>x.id===cid);if(ct)break;}if(!ct)return;
    const r=ct.reqs;let ok=true;let miss=[];
    if(r.pta&&this.c.pta<r.pta){ok=false;miss.push('觸媒廠≥'+r.pta);}
    if(r.cobalt&&this.c.cobalt<r.cobalt){ok=false;miss.push('硫酸鈷≥'+r.cobalt);}
    if(r.nickel&&this.c.nickel<r.nickel){ok=false;miss.push('硫酸鎳≥'+r.nickel);}
    if(r.recycle&&this.c.recycle<r.recycle){ok=false;miss.push('回收廠≥'+r.recycle);}
    if(r.iso&&this.c.iso<r.iso){ok=false;miss.push('ISO認證≥'+r.iso);}
    if(r.tech&&this.tech<r.tech){ok=false;miss.push('技術≥'+r.tech);}
    if(r.esg&&this.esg<r.esg){ok=false;miss.push('ESG≥'+r.esg);}
    if(r.maxPoll!==undefined&&this.poll>r.maxPoll){ok=false;miss.push('污染≤'+r.maxPoll);}
    if(!ok){UI.toast('❌ 未達標：'+miss.join('、'),'bad');return;}
    this.done.push(cid);this.funds+=ct.rwd.funds;this.rep=Math.min(100,this.rep+ct.rwd.rep);
    this.countries.add(ct.country);
    UI.toast(ct.flag+' '+ct.client+' 供貨成功！+$'+ct.rwd.funds,'good');
    UI.renderTrade();UI.updateAll();},

  nextTurn(){
    if(this.tutStep!==0)return;
    this.year++;
    const msgs=[];
    /* 1. Pollution */
    const pollD=this.calcPollPerTurn();
    this.poll=Math.max(0,this.poll+pollD);
    /* 1b. ESG DECAY */
    const esgDecay=Math.floor(this.poll/15);
    if(esgDecay>0){this.esg=Math.max(0,this.esg-esgDecay);if(esgDecay>=2)msgs.push({type:'warn',text:'☣️ 重金屬污染累積，侵蝕 ESG -'+esgDecay});}
    /* 1c. Market drift */
    SUP.forEach(s=>{
      let drift=(Math.random()-0.5)*s.swing;
      if(s.id==='drc'&&this.stageIdx>=2)drift+=(Math.random()-0.3)*0.2; /* EV boom increases cobalt price */
      if(s.id==='indo'&&this.stageIdx>=3)drift+=(Math.random()-0.4)*0.15; /* Nickel export ban effects */
      this.matMarket[s.id]=Math.max(0.6,Math.min(2.5,this.matMarket[s.id]+drift));
    });
    /* 1d. Auto-buy Manager */
    let mgrReport=null;
    if(this.managerActive){
      const buyResult=this.managerBuy();
      const advice=this.managerAdvice();
      mgrReport='<b>採購：</b>'+buyResult+'<br><b>💡 建議：</b>'+advice;
    }
    /* 2. Costs */
    const maint=this.totalFac()*40+(this.managerActive?80:0);
    this.funds-=maint;
    let cTax=0;
    if(this.stageIdx>=4){cTax=this.poll*4;this.funds-=cTax;} /* Heavy carbon tax late game */
    /* 3. Materials & Revenue */
    const need=this.calcMatNeed();let rev=this.calcRev();
    if(need>0&&this.materials<need){
      const ratio=need>0?this.materials/need:0;
      /* If recycling center exists, it mitigates material shortage heavily */
      const recBoost=this.c.recycle>0?0.3:0;
      rev=Math.max(MIN_INC,Math.floor(rev*Math.max(0.3,ratio+recBoost)));
      this.materials=0;msgs.push({type:'warn',text:'⚠️ 礦石原料不足！工廠降載運轉，聲譽 -2'});this.rep=Math.max(0,this.rep-2);
    }else{
      /* Recycle factory saves materials! 10% save per factory */
      const saveRate=Math.min(0.5,this.c.recycle*0.1);
      const actualNeed=Math.floor(need*(1-saveRate));
      this.materials=Math.max(0,this.materials-actualNeed);
    }
    /* 4. Total Income */
    const totalInc=rev+BASE_INC[this.stageIdx];
    this.funds+=totalInc;
    if(this.funds<0)this.funds=0;
    this.history.push({year:this.year,esg:this.esg,poll:this.poll,rev:totalInc,funds:this.funds});
    
    this.pollConsequences(msgs);
    const ev=this.rollEvent();
    
    if(this.rep<=0){UI.showGameOver();return;}
    const stage=STAGES[this.stageIdx];
    if(stage&&stage.goals.every(g=>g.ck(this))){
      if(this.stageIdx<STAGES.length-1){const ci=this.stageIdx;this.stageIdx++;UI.updateAll();UI.showStageComplete(ci,STAGES[this.stageIdx]);return;}
      else{UI.showVictory();return;}
    }
    
    UI.showTurnReport(totalInc,maint,cTax,pollD,mgrReport,msgs,ev);
    UI.renderBuild();UI.renderTrade();UI.updateAll();
  },

  pollConsequences(msgs){
    if(this.poll>=35&&this.poll<55&&Math.random()<0.35){const f=150+Math.floor(Math.random()*150);this.funds=Math.max(0,this.funds-f);msgs.push({type:'warn',text:'⚠️ 觀音區環保巡守隊警告！罰款 -$'+f});}
    if(this.poll>=55&&this.poll<75){this.rep=Math.max(0,this.rep-4);if(Math.random()<0.4){const f=400+Math.floor(Math.random()*200);this.funds=Math.max(0,this.funds-f);msgs.push({type:'bad',text:'💧 紅色廢水外溢！遭重罰 -$'+f+'，聲譽 -4'});}}
    if(this.poll>=75){this.rep=Math.max(0,this.rep-10);this.funds=Math.max(0,this.funds-600);msgs.push({type:'bad',text:'☣️ 嚴重重金屬污染！勒令停工罰款 $600，聲譽 -10'});
      if(Math.random()<0.3){const facs=BKEYS.filter(k=>B[k].rev>0&&this.c[k]>0);if(facs.length){const f=facs[Math.floor(Math.random()*facs.length)];this.c[f]--;msgs.push({type:'bad',text:'⛔ '+B[f].name+' 被環保署強制關閉！'});}}}
  },
  rollEvent(){
    const pool=EVENTS[this.stageIdx];if(!pool||!pool.length)return null;
    if(!this.shownEvents[this.stageIdx])this.shownEvents[this.stageIdx]=new Set();
    const shown=this.shownEvents[this.stageIdx];
    const avail=[];
    for(let i=0;i<pool.length;i++){
      if(shown.has(i))continue;
      if(pool[i].id==='cbam_event'&&this.c.iso>=1)continue;
      avail.push(i);
    }
    if(avail.length===0){
      shown.clear();
      for(let i=0;i<pool.length;i++){
        if(pool[i].id==='cbam_event'&&this.c.iso>=1)continue;
        avail.push(i);
      }
      if(avail.length===0)return null;
    }
    const idx=avail[Math.floor(Math.random()*avail.length)];
    shown.add(idx);this.lastEvIdx[this.stageIdx]=idx;
    return pool[idx];
  },
  applyEff(eff){if(!eff)return;if(eff.funds)this.funds+=eff.funds;if(eff.rep)this.rep+=eff.rep;if(eff.tech)this.tech+=eff.tech;if(eff.esg)this.esg+=eff.esg;if(eff.poll)this.poll=Math.max(0,this.poll+eff.poll);if(eff.mkt)Object.entries(eff.mkt).forEach(([sid,d])=>{this.matMarket[sid]=Math.max(0.6,Math.min(2.5,(this.matMarket[sid]||1)+d));});this.rep=Math.max(0,Math.min(100,this.rep));this.esg=Math.max(0,Math.min(100,this.esg));if(this.funds<0)this.funds=0;},
  restart(){this.resetVars();UI.renderBuild();UI.renderTrade();UI.updateAll();UI.closeModal();setTimeout(()=>UI.showModal('🔄 重新開始','<div style="font-size:13px;text-align:center;padding:8px 0;">準備回到1992年，再次出發！</div>',()=>{UI.closeModal();G.startTut();}),300);},

  managerBuy(){
    const need=this.calcMatNeed()*2;
    if(this.materials>=Math.min(this.matCap*0.8,need))return'礦石庫存充足，本年未採購';
    const batches=Math.min(3,Math.floor((this.matCap-this.materials)/50));
    if(batches===0)return'倉庫已滿，跳過';
    const priced=SUP.map(s=>({...s,ep:Math.floor(s.base*(this.matMarket[s.id]||1))})).sort((a,b)=>a.ep-b.ep);
    const bought=[];
    for(let i=0;i<batches&&this.materials<this.matCap;i++){
      const pick=Math.random()<0.60?priced[0]:priced[Math.floor(Math.random()*priced.length)];
      const price=Math.floor(pick.base*(this.matMarket[pick.id]||1)*(0.88+Math.random()*0.24));
      if(this.funds<price)break;
      if(pick.route==='risk'&&Math.random()<0.25){
        this.funds-=price;this.materials=Math.min(this.matCap,this.materials+20);
        this.matBuys[pick.id]=(this.matBuys[pick.id]||0)+1;
        bought.push(pick.flag+'$'+price+'⚠️');
      }else{
        this.funds-=price;this.materials=Math.min(this.matCap,this.materials+50);
        this.matBuys[pick.id]=(this.matBuys[pick.id]||0)+1;
        bought.push(pick.flag+'$'+price);
      }
    }
    return bought.length?'採購礦物：'+bought.join(' ・ '):'資金不足，未採購';
  },

    if(this.esg<30&&this.stageIdx>=2)tips.push('🌿 ESG不足！日系電池大廠非常看重環保，請加速投資綠色設施。');
    else if(this.esg<50&&this.stageIdx>=3)tips.push('🌿 歐洲車廠對碳排要求極高，ESG低於50無法接單。');
    
    const need=this.calcMatNeed();
    if(need>0&&this.materials<need)tips.push('📦 金屬原料斷鏈，工廠正降載運轉！請確保資金採購剛果鈷礦或印尼鎳礦。');
    
    if(this.funds<500)tips.push('💸 現金流吃緊！暫停擴廠，多接幾筆跨國合約回血。');
    
    if(this.stageIdx===0&&this.c.pta<3)tips.push('⚗️ 初期需靠 PTA 觸媒廠穩住陣腳，建議優先建設。');

  saveToSheets(){
    // 固定使用同一組網址
    const url = 'https://script.google.com/macros/s/AKfycbzPiIQOSrJSDcCJeYDIYUX5vjDJXD0oKbW0Tv3YYStw3ULkhy4akj3GoEYXwqTPphsA/exec';
    
    // 顯示上傳提示
    UI.toast('📊 正在上傳成績至資料庫...', 'good', 3000);
    
    const bldg=BKEYS.filter(k=>this.c[k]>0).map(k=>B[k].name+'×'+this.c[k]).join(' ');
    const totalBuys=Object.values(this.matBuys).reduce((a,b)=>a+b,0);
    const purch=totalBuys===0?'無':SUP.filter(s=>(this.matBuys[s.id]||0)>0).map(s=>s.name+':'+Math.round((this.matBuys[s.id]||0)/totalBuys*100)+'%').join(' ');
    const ifrId='gs-ifr-'+Date.now();
    const ifr=document.createElement('iframe');ifr.name=ifrId;ifr.style.display='none';document.body.appendChild(ifr);
    const frm=document.createElement('form');frm.method='POST';frm.action=url;frm.target=ifrId;frm.style.display='none';
    
    // 將美琪瑪的 CBAM 認證寫入原本永光的 ZDHC 參數，保證試算表欄位完全相容
    const cbamStatus = this.c.iso >= 1 ? 'CBAM已認證' : '未認證';
    
    const fields={
      company: '美琪瑪',
      player: this.playerName,
      date: new Date().toLocaleDateString('zh-TW'),
      year: this.year,
      funds: this.funds,
      rep: this.rep,
      tech: this.tech,
      esg: this.esg,
      poll: this.poll,
      countries: this.countries.size,
      contracts: this.done.length,
      zdhc: cbamStatus, // 無縫共用您的試算表「ZDHC」欄位
      buildings: bldg,
      purchases: purch,
      contractList: this.done.join(',')
    };
      
    Object.entries(fields).forEach(([k,v])=>{const inp=document.createElement('input');inp.type='hidden';inp.name=k;inp.value=v;frm.appendChild(inp);});
    document.body.appendChild(frm);frm.submit();
    setTimeout(()=>{if(frm.parentNode)frm.parentNode.removeChild(frm);if(ifr.parentNode)ifr.parentNode.removeChild(ifr);},5000);
  }
};

    if(ev.eff&&!ev.choices){G.applyEff(ev.eff);let et=[];if(ev.eff.funds)et.push('資金'+(ev.eff.funds>0?'+':'')+ev.eff.funds);if(ev.eff.rep)et.push('聲譽'+(ev.eff.rep>0?'+':'')+ev.eff.rep);if(ev.eff.tech)et.push('技術'+(ev.eff.tech>0?'+':'')+ev.eff.tech);if(ev.eff.esg)et.push('ESG'+(ev.eff.esg>0?'+':'')+ev.eff.esg);
      if(et.length)html+='<div style="font-size:11px;color:var(--gold);background:rgba(184,134,11,0.08);padding:4px 8px;border-radius:6px;margin-bottom:6px;">影響：'+et.join('、')+'</div>';}
    if(ev.choices&&ev.choices.length){
      if(ev.eff)G.applyEff(ev.eff);
      this.showModal(ev.tone==='bad'?'⚠️ 市場危機':'📰 戰略決策',html,null);
      const foot=document.getElementById('m-foot');foot.innerHTML='';
      ev.choices.forEach(ch=>{
        const btn=document.createElement('div');btn.className='ch-btn';
        btn.innerHTML='<div class="ch-title">'+ch.label+'</div><div class="ch-desc">'+ch.desc+'</div>';
        if(ch.certify){
          btn.onclick=()=>{
            if(G.c.iso>=1){UI.toast('🏅 已完成認證','warn');this.closeModal();UI.updateAll();return;}
            if(G.tech<50||G.esg<50){
              UI.toast('❌ 條件未達！需技術≥50（目前'+G.tech+'）且ESG≥50（目前'+G.esg+'）','bad',3500);
              return;

            if(G.funds<1200){UI.toast('❌ 資金不足 $1,200！','bad');return;}
            G.c.iso=1;G.funds=Math.max(0,G.funds-1200);
            G.esg=Math.min(100,G.esg+15);G.poll=Math.max(0,G.poll-2);G.rep=Math.min(100,G.rep+10);
            this.closeModal();
            UI.toast('🏅 CBAM 低碳認證完成！ESG+15 污染-2 聲譽+10','good',4000);
            UI.updateAll();UI.renderBuild();
          };
        }else{
          btn.onclick=()=>{
            G.applyEff(ch.fx);
            const fx=ch.fx||{};const et=[];
            if(fx.funds)et.push('💰'+(fx.funds>0?'+':'')+fx.funds);
            if(fx.rep)et.push('🏆'+(fx.rep>0?'+':'')+fx.rep);
            if(fx.tech)et.push('🔬'+(fx.tech>0?'+':'')+fx.tech);
            if(fx.esg)et.push('🌿'+(fx.esg>0?'+':'')+fx.esg);

            if(fx.mkt)Object.entries(fx.mkt).forEach(([sid,d])=>{const s=SUP.find(x=>x.id===sid);if(s)et.push(s.flag+'礦價'+(d>0?'↑':'↓'));});
            this.closeModal();
            const hasNeg=et.some(t=>/(💰|🏆|🔬|🌿)-|☣️\+/.test(t));
            UI.toast('▸ 決策結果：'+(et.length?et.join(' ｜ '):'已生效'),hasNeg?'warn':'good',3500);
            UI.updateAll();UI.renderBuild();
          };
        }
        foot.appendChild(btn);
      });
    }else{this.showModal(ev.tone==='bad'?'⚠️ 突發事件':'📰 產業新聞',html,()=>{this.closeModal();UI.updateAll();});}

      const btn=document.getElementById('m-btn');btn.innerText='📰 處理本年事件 →';btn.className='mbtn gold';
    }else{
      this.showModal(G.year+'年 📊 營運報告',html,()=>this.closeModal());
    }
  },
  showStageComplete(ci,next){
    const voices=['','💬「紡織業轉移了，但我們發現了電池這片新藍海。」','💬「一顆來自剛果的鈷礦，在觀音精煉後，成為了驅動特斯拉的心臟。」','💬「環境的債終究要還。紅色廢水是教訓，廢觸媒循環是我們的救贖。」','💬「電動車的心臟在觀音，而觀音的未來在永續。」'];
    const voice=voices[G.stageIdx]||'';const goals=next.goals.map(g=>'🔹 '+g.txt).join('<br>');
    let html='<div style="text-align:center;"><div style="font-size:24px;margin-bottom:8px;">🎉🔋✨</div><div style="font-size:16px;font-weight:900;color:var(--gold);margin-bottom:6px;">'+STAGES[ci].title+'<br>達成！</div>';
    if(voice)html+='<div style="font-size:12px;color:var(--muted);margin:10px 0;padding:8px;background:rgba(0,0,0,0.04);border-radius:8px;border-left:3px solid var(--teal);">'+voice+'</div>';
    html+='<hr style="border:none;border-top:1.5px dashed var(--brd);margin:10px 0;"><div style="text-align:left;line-height:1.6;">'+next.desc+'<br><br><span style="color:var(--gold)">🏆 新階段挑戰：</span><br>'+goals+'</div></div>';
    this.showModal('🔋 階段躍升',html,()=>{this.closeModal();UI.renderBuild();UI.renderTrade();UI.updateAll();});
    document.getElementById('m-btn').innerText='⚡ 啟動新階段';document.getElementById('m-btn').className='mbtn gold';
  },
  showGameOver(){this.showModal('💔 公司倒閉','<div style="text-align:center;"><div style="font-size:40px;">☠️</div><div style="font-size:14px;color:var(--red);font-weight:700;margin:8px 0;">環境與聲譽崩盤</div><div style="font-size:12px;">因嚴重污染被勒令停工，跨國客戶全面抽單。<br>企業無法在觀音立足。</div></div>',null);
    document.getElementById('m-foot').innerHTML='<button class="mbtn red" onclick="G.restart()">🔄 重返 1992</button>';},

  showVictory(){
    let html='<div style="text-align:center;"><div style="font-size:28px;">🏆⚡🌍</div><div style="font-size:16px;font-weight:900;color:var(--gold);margin:6px 0;font-family:\'Noto Serif TC\',serif;">恭喜策略長！'+G.playerName+'</div><div style="font-size:11px;margin-bottom:8px;">1992 觀音觸媒廠 ➡️ 2030 全球電動車樞紐</div></div>';
    html+=this.buildChart();
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:8px 0;text-align:center;">';
    html+='<div style="background:rgba(44,94,123,0.08);padding:4px;border-radius:6px;"><div style="font-size:8px;color:var(--muted);">出口版圖</div><div style="font-family:\'Playfair Display\',serif;font-size:14px;color:var(--teal);">'+G.countries.size+'國</div></div>';
    html+='<div style="background:rgba(184,134,11,0.08);padding:4px;border-radius:6px;"><div style="font-size:8px;color:var(--muted);">跨國合約</div><div style="font-family:\'Playfair Display\',serif;font-size:14px;color:var(--gold);">'+G.done.length+'筆</div></div>';
    html+='<div style="background:rgba(60,179,113,0.08);padding:4px;border-radius:6px;"><div style="font-size:8px;color:var(--muted);">終局ESG/污染</div><div style="font-family:\'Playfair Display\',serif;font-size:14px;color:var(--green);">'+G.esg+'/☣️'+G.poll+'</div></div></div>';
    html+='<div style="text-align:left;font-size:11px;background:rgba(44,94,123,0.04);padding:6px;border-radius:6px;margin-bottom:6px;"><b>🏭 觀音基地現況：</b><br>';
    BKEYS.forEach(k=>{if(G.c[k]>0)html+=B[k].e+' '+B[k].name+' ×'+G.c[k]+'&emsp;';});
    html+='</div>';
    html+='<div style="text-align:left;font-size:11px;background:rgba(184,134,11,0.06);padding:6px;border-radius:6px;margin-bottom:6px;"><b>🌍 全球能源網：</b><br>';
    if(G.done.length===0)html+='（無）';
    G.done.forEach(id=>{for(let s=1;s<=5;s++){const ct=(CONTRACTS[s]||[]).find(x=>x.id===id);if(ct){html+=ct.flag+' '+ct.client+'<br>';break;}}});
    html+='</div>';
    html+='<div style="text-align:left;font-size:10px;background:rgba(44,94,123,0.06);padding:6px;border-radius:6px;line-height:1.5;"><b>📚 從遊戲看懂美琪瑪：</b><br>';
    html+='✅ <b>隱形冠軍：</b>美琪瑪位於桃園觀音大同一路，是推動全球電動車(特斯拉、雙B)運轉的關鍵中游。<br>';
    html+='✅ <b>蝴蝶效應：</b>剛果開採的鈷礦 ➡️ 台灣觀音精煉 ➡️ 日本松下製成電池芯 ➡️ 美國組裝成車。<br>';
    html+='✅ <b>環境真相：</b>化學工業無可避免帶來環境壓力(如2012紅色廢水)，但轉型是必經之路。<br>';
    html+='✅ <b>循環經濟：</b>他們成功開發廢觸媒回收技術(回收率高達90%)，從污染源轉變為全球能源循環者。</div>';
    
    G.saveToSheets();
    this.showModal('🏆 永續能源的勝利',html,null);
    document.getElementById('m-foot').innerHTML='<button class="mbtn gold" onclick="G.captureScreen()">📸 截圖留念</button><button class="mbtn" onclick="G.restart()" style="margin-top:6px;">🔄 再玩一次</button>';
  },

  buildChart(){
    const h=G.history;if(h.length<2)return '';
    const W=300,H=120,P=22;
    const maxEsg=Math.max(100,...h.map(d=>d.esg));
    const maxPoll=Math.max(50,...h.map(d=>d.poll));
    const maxRev=Math.max(100,...h.map(d=>d.rev));
    const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    const toY=(v,max)=>clamp(P+((H-2*P)*(1-v/max)),P,H-P);
    const toX=(i)=>P+(W-2*P)*i/(h.length-1);
    let esgPts='',pollPts='',revPts='';
    h.forEach((d,i)=>{
      const x=toX(i);
      esgPts+=x+','+toY(d.esg,maxEsg)+' ';
      pollPts+=x+','+toY(d.poll,maxPoll)+' ';
      revPts+=x+','+toY(d.rev,maxRev)+' ';
    });
    let svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;margin:6px 0;background:rgba(0,0,0,0.03);border-radius:8px;" overflow="hidden">';
    svg+='<defs><clipPath id="cp"><rect x="'+P+'" y="'+P+'" width="'+(W-2*P)+'" height="'+(H-2*P)+'"/></clipPath></defs>';
    for(let i=0;i<=4;i++){const y=P+(H-2*P)*i/4;svg+='<line x1="'+P+'" y1="'+y+'" x2="'+(W-P)+'" y2="'+y+'" stroke="#ddd" stroke-width="0.5"/>';}
    svg+='<g clip-path="url(#cp)">';
    svg+='<polyline points="'+esgPts+'" fill="none" stroke="#3cb371" stroke-width="2" opacity="0.85"/>';
    svg+='<polyline points="'+pollPts+'" fill="none" stroke="#c0504d" stroke-width="2" opacity="0.85"/>';
    svg+='<polyline points="'+revPts+'" fill="none" stroke="#b8860b" stroke-width="2" opacity="0.85" stroke-dasharray="4 2"/>';
    svg+='</g>';
    svg+='<text x="'+P+'" y="13" font-size="9" fill="#3cb371" font-family="sans-serif">🌿ESG</text>';
    svg+='<text x="'+(P+55)+'" y="13" font-size="9" fill="#c0504d" font-family="sans-serif">☣️污染</text>';
    svg+='<text x="'+(P+110)+'" y="13" font-size="9" fill="#b8860b" font-family="sans-serif">💰年收(虛線)</text>';
    if(h.length>0){svg+='<text x="'+P+'" y="'+(H-3)+'" font-size="8" fill="#888" font-family="sans-serif">'+h[0].year+'</text>';svg+='<text x="'+(W-P-22)+'" y="'+(H-3)+'" font-size="8" fill="#888" font-family="sans-serif">'+h[h.length-1].year+'</text>';}
    svg+='</svg>';
    return '<div style="margin:4px 0;"><div style="font-size:10px;font-weight:700;color:var(--teal);margin-bottom:2px;">📊 發展趨勢圖</div>'+svg+'</div>';
  },

  help(type){const h={funds:'【💰 資金】\n建廠與購買礦石都需要資金。\n原料不足會導致工廠降載。\n第四階段起，歐盟會依據污染值課徵高額碳稅。',rep:'【🏆 聲譽】\n跨國大廠對你的信任。\n發生「紅色廢水」等污染事件會大幅扣減，歸零即破產。',tech:'【🔬 技術力】\n從「PTA觸媒」跨足「硫酸鈷/鎳電池材料」的關鍵。\n建造電池材料實驗室可快速提升。',esg:'【🌿 ESG分數】\n代表企業永續經營的能力。\n歐盟、特斯拉等頂級客戶要求嚴格的 ESG 達標才能接單。\n投資【廢觸媒循環中心】與【綠能屋頂】可大幅加分。',poll:'【☣️ 污染值】\n提煉金屬必然產生重金屬污染。\n累積過高會引發裁罰，甚至強迫關廠。\n也會每年腐蝕你的 ESG 分數。'};
    this.showModal('❓ 營運指標說明','<div style="white-space:pre-line;font-size:13px;line-height:1.6;">'+((h[type])||'')+'</div>',()=>this.closeModal());},
  stageDetail(){const s=STAGES[G.stageIdx];const goals=s.goals.map(g=>'🔹 '+g.txt).join('<br>');this.showModal(s.title,'<div style="line-height:1.6;">'+s.desc+'<br><br><span style="color:var(--gold)">🏆 階段目標：</span><br>'+goals+'</div>',()=>this.closeModal());},
  hlEl(sel,text){document.getElementById('tut-ov').style.display='block';const el=document.querySelector(sel);if(el){el.classList.add('hl-target');const bp=el.closest('#bottom-panel')||el.closest('#hud');if(bp)bp.style.zIndex='2001';}document.getElementById('tut-text').innerHTML='<div class="tut-t">策略指引</div>'+text.replace(/\n/g,'<br>');document.getElementById('tut-tip').style.display='block';},
  clearHL(){document.getElementById('tut-ov').style.display='none';document.getElementById('tut-tip').style.display='none';document.querySelectorAll('.hl-target').forEach(el=>el.classList.remove('hl-target'));const bp=document.getElementById('bottom-panel');if(bp)bp.style.zIndex='100';const hud=document.getElementById('hud');if(hud)hud.style.zIndex='100';}
};
window.addEventListener('DOMContentLoaded',()=>G.init());
</script>
